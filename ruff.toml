# Shared ruff config for the whole repo. Both packages have no [tool.ruff] of
# their own, so ruff walks up and uses this. Kept at defaults on purpose,
# except the complexity gate below.
target-version = "py313"
line-length = 88

[lint]
# Complexity gate (function size / nesting). extend-select keeps ruff's default
# E/F checks. The former giants (match.py:match_mentions, merge.py:assemble_entries)
# were decomposed for #26, so the ceilings now sit at their targets — every
# function stays within them. Don't raise a ceiling to fit new code; split the
# function (see data-pipeline/CLAUDE.md).
extend-select = ["C901", "PLR0912", "PLR0915"]

[lint.mccabe]
max-complexity = 10

[lint.pylint]
max-branches = 12
max-statements = 50
