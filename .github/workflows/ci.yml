name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [parse-routes, fetch-pois]
    defaults:
      run:
        working-directory: data-pipeline/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sync (with dev deps)
        run: uv sync --dev

      # Blocking as of #26: the lint/type/dict baseline is cleared, so a
      # regression fails the build.
      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy --config-file "${{ github.workspace }}/mypy.ini" pipeline

      # Bare-dict ratchet: fails if untyped dict/collection annotations rise
      # above the committed .dict-baseline (now 0 in both packages).
      - name: Dict ratchet
        run: ../dict-ratchet.sh

      - name: Pytest
        run: uv run pytest

  route-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The guidelines (#31) land before the scaffold (#20). Until package.json
      # exists this job no-ops; once the scaffold is committed it enforces the
      # green-bar automatically — blocking from day one, no debt baseline.
      - name: Detect scaffold
        id: scaffold
        run: |
          if [ -f route-map/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "route-map/package.json not present yet — skipping (see route-map/CLAUDE.md, #20)."
          fi

      - uses: actions/setup-node@v4
        if: steps.scaffold.outputs.exists == 'true'
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: route-map/package-lock.json

      - name: Install
        if: steps.scaffold.outputs.exists == 'true'
        working-directory: route-map
        run: npm ci

      - name: Biome (format + lint)
        if: steps.scaffold.outputs.exists == 'true'
        working-directory: route-map
        run: npm run check

      - name: Typecheck
        if: steps.scaffold.outputs.exists == 'true'
        working-directory: route-map
        run: npm run typecheck

      - name: Test
        if: steps.scaffold.outputs.exists == 'true'
        working-directory: route-map
        run: npm run test

      - name: Build
        if: steps.scaffold.outputs.exists == 'true'
        working-directory: route-map
        run: npm run build
